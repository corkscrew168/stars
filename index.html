<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <!-- 🔥 超重要：viewport固定 -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
  />

  <title>20260119</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;

      width: 100%;
      height: 100%;

      position: fixed;   /* ← 完全固定 */
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;

      overflow: hidden;
      background: #0e0e0e;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
      touch-action: none;
    }

    canvas {
      display: block;
      margin: auto;
      touch-action: none;
    }
  </style>
</head>

<body>
  <!-- ゲーム本体 -->
  <script type="module" src="/src/game.ts"></script>

  <!-- 🔥 iOS完全ロック対策 -->
  <script>
    // 右クリック無効
    document.addEventListener("contextmenu", e => e.preventDefault());

    // スクロール完全停止
    document.addEventListener(
      "touchmove",
      e => e.preventDefault(),
      { passive: false }
    );

    // 画面サイズ変化を強制リセット
    window.addEventListener("resize", () => {
      document.body.style.height = window.innerHeight + "px";
    });

    // 初回実行
    document.body.style.height = window.innerHeight + "px";
  </script>
</body>
</html>
